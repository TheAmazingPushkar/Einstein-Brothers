<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In - kalaSetu</title>
    <link rel="stylesheet" href="style.css">
    <!-- Import Supabase via CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="background-overlay"></div>

    <div class="main-container">
        <div class="brand-header">
            <h1 class="brand-title">kalaSetu</h1>
            <p class="brand-subtitle">Bridging Cultures Through Collaboration</p>
        </div>

        <div class="auth-card">
            <h2>Welcome Back</h2>
            <div class="input-group">
                <label for="login-email">Email</label>
                <input type="email" id="login-email" placeholder="Enter your email" required />
            </div>
            <div class="input-group">
                <label for="login-password">Password</label>
                <input type="password" id="login-password" placeholder="Enter your password" required />
            </div>
            <button id="login-btn" class="primary-btn">Log In</button>
            
            <!-- Link to the separate signup page -->
            <p class="switch-form">New to kalaSetu? <a href="signup.html">Sign Up</a></p>
            
            <p id="login-message" class="status-message"></p>
        </div>
    </div>

    <!-- Import our custom JS files -->
    <script src="supabase-client.js"></script>
    <script src="auth.js"></script>
</body>
</html>
