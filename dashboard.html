<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cattle AI Dashboard</title>
    <link rel="stylesheet" href="style.css"> <!-- Your custom CSS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <nav>
        <h2>CattleAI Portal</h2>
        <button onclick="signOut()">Sign Out</button>
    </nav>

    <main class="container">
        <section class="upload-section">
            <h3>Upload Image for Classification</h3>
            <p>Supported: Cattle and Buffaloes (JPEG/PNG)</p>
            
            <input type="file" id="imageInput" accept="image/*" onchange="previewImage(event)">
            <img id="preview" style="display:none; max-width: 300px; margin: 20px 0;">
            
            <button id="predictBtn" onclick="runInference()">Analyze Animal</button>
        </section>

        <section id="resultArea" class="result-card" style="display:none;">
            <h4>Result: <span id="label">--</span></h4>
            <p>Confidence: <span id="confidence">0</span>%</p>
        </section>
    </main>

    <script>
        const SUPABASE_URL = "YOUR_SUPABASE_URL";
        const SUPABASE_KEY = "YOUR_SUPABASE_KEY";
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // API URL from your Render Deployment
        const API_URL = "https://your-fastapi-app.onrender.com/predict";

        function previewImage(event) {
            const reader = new FileReader();
            reader.onload = () => {
                const output = document.getElementById('preview');
                output.src = reader.result;
                output.style.display = 'block';
            };
            reader.readAsDataURL(event.target.files[0]);
        }

        async function runInference() {
            const fileInput = document.getElementById('imageInput');
            if (fileInput.files.length === 0) return alert("Please select an image first");

            const btn = document.getElementById('predictBtn');
            btn.innerText = "Processing...";
            btn.disabled = true;

            const formData = new FormData();
            formData.append("file", fileInput.files[0]);

            try {
                const response = await fetch(API_URL, {
                    method: "POST",
                    body: formData
                });
                const data = await response.json();

                document.getElementById('resultArea').style.display = 'block';
                document.getElementById('label').innerText = data.class;
                document.getElementById('confidence').innerText = data.confidence;
            } catch (error) {
                console.error("Error:", error);
                alert("Failed to connect to the AI model.");
            } finally {
                btn.innerText = "Analyze Animal";
                btn.disabled = false;
            }
        }

        async function signOut() {
            await supabase.auth.signOut();
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
