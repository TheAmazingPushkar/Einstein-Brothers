<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Django Auth Site{% endblock %}</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; background: #f2f2f7; color: #222; }
        .page { max-width: 760px; margin: 0 auto; padding: 28px; }
        .header { background: #0a4d8c; color: white; padding: 20px; }
        .header a { color: white; margin-left: 16px; text-decoration: none; }
        .card { background: white; border-radius: 12px; padding: 28px; box-shadow: 0 10px 20px rgba(0,0,0,.08); }
        .form-group { margin-bottom: 16px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; }
        input { width: 100%; padding: 10px 12px; border: 1px solid #ccd0d8; border-radius: 8px; }
        button { background: #0a4d8c; color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; }
        .messages { margin-bottom: 18px; }
        .message { padding: 12px 16px; border-radius: 8px; margin-bottom: 10px; }
        .success { background: #e4f4ea; color: #1a5f35; }
        .error { background: #fdecea; color: #801919; }
        .info { background: #e8f1fd; color: #11315d; }
        .nav { margin-top: 12px; }
    </style>
</head>
<body>
    <div class="header">
        <div class="page">
            <strong>Django Auth Site</strong>
            <span class="nav">
                {% if user.is_authenticated %}
                    <a href="{% url 'home' %}">Home</a>
                    <a href="{% url 'logout' %}">Logout</a>
                {% else %}
                    <a href="{% url 'landing' %}">Landing</a>
                    <a href="{% url 'login' %}">Login</a>
                    <a href="{% url 'signup' %}">Signup</a>
                {% endif %}
            </span>
        </div>
    </div>
    <div class="page">
        {% if messages %}
            <div class="messages">
                {% for message in messages %}
                    <div class="message {% if message.tags %}{{ message.tags }}{% endif %}">{{ message }}</div>
                {% endfor %}
            </div>
        {% endif %}
        <div class="card">
            {% block content %}{% endblock %}
        </div>
    </div>
</body>
</html>
