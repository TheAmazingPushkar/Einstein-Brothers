<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cattle AI Dashboard</title>
    <link rel="stylesheet" href="styles.css"> <!-- Your custom CSS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <nav>
        <h2>CattleAI Portal</h2>
        <button onclick="signOut()">Sign Out</button>
    </nav>

    <main class="container">
        <section class="upload-section">
            <h3>Upload Image for Classification</h3>
            <p>Supported: Cattle and Buffaloes (JPEG/PNG)</p>
            
            <input type="file" id="imageInput" accept="image/*" onchange="previewImage(event)">
            <img id="preview" style="display:none; max-width: 300px; margin: 20px 0;">
            
            <button id="predictBtn" onclick="runInference()">Analyze Animal</button>
        </section>

        <section id="resultArea" class="result-card" style="display:none;">
            <h4>Result: <span id="label">--</span></h4>
            <p>Confidence: <span id="confidence">0</span>%</p>
            <!-- This is the new part for Frontend 3 -->
    <div class="heatmap-container">
        <h5>AI Focus Map (Grad-CAM):</h5>
        <img id="heatmapDisplay" src="" style="width: 100%; border-radius: 8px; border: 2px solid #ddd;">
        <p><small>Red areas show where the AI focused to make its decision.</small></p>
    </div>
        </section>
    </main>

    <script>
    // 1. Fix naming conflict (Use 'sb' instead of 'supabase')
   

    // 2. Add /predict to your URL
    const API_URL = "https://test-deployment-j9e4.onrender.com/predict";

    function previewImage(event) {
        const file = event.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = () => {
                const output = document.getElementById('preview');
                output.src = reader.result;
                output.style.display = 'block';
            };
            reader.readAsDataURL(file);
        }
    }

    async function runInference() {
        const fileInput = document.getElementById('imageInput');
        if (fileInput.files.length === 0) return alert("Please select an image first");

        const btn = document.getElementById('predictBtn');
        btn.innerText = "Processing...";
        btn.disabled = true;

        const formData = new FormData();
        formData.append("file", fileInput.files[0]);

        try {
            const response = await fetch(API_URL, {
                method: "POST",
                body: formData
            });
            
            if (!response.ok) throw new Error("Server responded with an error");
            
            const data = await response.json();

            // Display Results
            document.getElementById('resultArea').style.display = 'block';
            document.getElementById('label').innerText = data.class;
            document.getElementById('confidence').innerText = data.confidence;
            
            // Display Heatmap
            const heatmapImg = document.getElementById('heatmapDisplay');
            heatmapImg.src = data.heatmap; 
            
        } catch (error) {
            console.error("Error:", error);
            alert("Failed to connect to the AI model. Ensure your Render backend is awake.");
        } finally {
            btn.innerText = "Analyze Animal";
            btn.disabled = false;
        }
    }

    async function signOut() {
        // Use the renamed 'sb' client here too
        await supabaseClient.auth.signOut();
        window.location.href = "index.html";
    }
</script>
     <!-- Import our custom JS files -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-client.js"></script>
    <script src="auth.js"></script>
</body>
</html>
